services:
  api:
    build: .
    container_name: pc4-api
    command: ["/app/api"]
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - ML_NODES=ml-node-1:9001,ml-node-2:9001,ml-node-3:9001
      - MODEL_PATH=/app/models/model.json
      - NODE_TIMEOUT_MS=3000
      - MONGO_ADDR=mongo:27017
      - MONGO_DB=pc4
      - MONGO_COLLECTION=predictions
      - REDIS_ADDR=redis:6379
      - REDIS_TTL_SECONDS=300
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - ml-node-1
      - ml-node-2
      - ml-node-3
      - mongo
      - redis

  ml-node-1:
    build: .
    container_name: pc4-ml-node-1
    command: ["/app/mlnode"]
    environment:
      - NODE_ID=ml-node-1
      - NODE_PORT=9001
      - MODEL_PATH=/app/models/model.json
    volumes:
      - ./models:/app/models:ro

  ml-node-2:
    build: .
    container_name: pc4-ml-node-2
    command: ["/app/mlnode"]
    environment:
      - NODE_ID=ml-node-2
      - NODE_PORT=9001
      - MODEL_PATH=/app/models/model.json
    volumes:
      - ./models:/app/models:ro

  ml-node-3:
    build: .
    container_name: pc4-ml-node-3
    command: ["/app/mlnode"]
    environment:
      - NODE_ID=ml-node-3
      - NODE_PORT=9001
      - MODEL_PATH=/app/models/model.json
    volumes:
      - ./models:/app/models:ro

  mongo:
    image: mongo:7
    container_name: pc4-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: pc4-redis
    ports:
      - "6379:6379"

  pc3-trainer:
    build: .
    container_name: pc3-seguridad-trainer
    profiles: ["offline"]
    command: ["/bin/sh", "-c", "/app/prepare -file /app/data/dataset.csv -workers 8 -batch-size 20000 -min-year 2022 -train-until 2025 -negative-ratio 0 -target-before 2026-06-01 -out /app/output && /app/train -train /app/output/ml_observations_train.csv.gz -test /app/output/ml_observations_test.csv.gz -metadata /app/output/ml_observations_metadata.json -workers 8 -epochs 80 -lambda 0.0005 -out /app/output -model /app/models/model.json"]
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./models:/app/models

volumes:
  mongo-data:
